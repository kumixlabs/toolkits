version: 2
updates:
  # Root npm/bun dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      biome:
        patterns:
          - "@biomejs/*"
          - "@kumix/biome-config"
      build:
        patterns:
          - "tsdown"
          - "typescript"
          - "turbo"
          - "@arethetypeswrong/*"
          - "publint"
      test:
        patterns:
          - "vitest"
          - "@vitest/*"
      changesets:
        patterns:
          - "@changesets/*"
      commitlint:
        patterns:
          - "@commitlint/*"
    commit-message:
      prefix: "build(deps)"
      prefix-development: "build(deps-dev)"
    labels:
      - "dependencies"

  # Per-package dependencies
  - package-ecosystem: "npm"
    directory: "/packages/email"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    groups:
      react-email:
        patterns:
          - "react*"
          - "react-email*"
      providers:
        patterns:
          - "resend"
          - "nodemailer"
    commit-message:
      prefix: "build(deps)"
    labels:
      - "dependencies"

  - package-ecosystem: "npm"
    directory: "/packages/storage"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    groups:
      aws:
        patterns:
          - "@aws-sdk/*"
      cloudinary:
        patterns:
          - "cloudinary"
    commit-message:
      prefix: "build(deps)"
    labels:
      - "dependencies"

  - package-ecosystem: "npm"
    directory: "/packages/utils"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    groups:
      crypto:
        patterns:
          - "bcryptjs"
          - "jsonwebtoken"
          - "ms"
      parsing:
        patterns:
          - "chrono-node"
    commit-message:
      prefix: "build(deps)"
    labels:
      - "dependencies"

  # GitHub Actions — keeps action versions pinned & current
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    groups:
      actions:
        patterns:
          - "actions/*"
          - "oven-sh/*"
    commit-message:
      prefix: "ci(deps)"
    labels:
      - "dependencies"
